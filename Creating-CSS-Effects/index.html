<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
        <title>Creating Effects with CSS</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <!--NAVBAR-->
        <nav class="nav-bar">
            <ul>
                <li>
                    <a href="#">Home</a>
                </li>
                <li class="drop">
                    <a href="#">Images</a>
                    <div class="rollover-menu">
                        <a href="#image1">Image 1</a>
                        <a href="#image2">Image 2</a>
                        <a href="#image3">Image 3</a>
                    </div>
                </li>
            </ul>
        </nav>
        <!--IMAGES-->
        <section>
            <!--IMAGE 1-->
            <div class="image-container" id="image1">
                <img src="images/Lifeline.webp" alt="Image of Lifeline from Apex Legends">
                <div class="overlay">
                    <h2 class="black-ops-one-regular">Lifeline</h2>
                    <p class="black-ops-one-regular">Lifeline is a combat medic in Apex Legends, known for her healing abilities and support role in the game.</p>
                </div>
            </div>
            <!--IMAGE 2-->
            <div class="image-container" id="image2">
                <img src="images/Zenyatta.jpg" alt="Image of Zenyatta from Overwatch" class="zoom">
            </div>
            <!--IMAGE 3-->
            <div class="image-container" id="image3">
                <div class="circle">
                    <img src="images/Warlock.jpg" alt="Image of a Warlock from Destiny 2">
                </div>
            </div>
        </section>
        <!--FOOTER-->
        <footer>
            <div class="footer-text">
                <p>&copy; Avery Labs. All rights reserved.</p>
            </div>
        </footer>
    </body>
</html>
