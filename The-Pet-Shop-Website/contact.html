    <!--Header-->
    <header>
        <div>
            <h1>Contact Us!</h1>
        </div>
    </header>
    <!--FORM-->
    <section>
        <div>
            <h3>Please provide your contact information and a brief message of your inquiry:</h3>
            <div>
                <form>
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name"><br>
                    <input type="email" placeholder="Email"><br>
                    <input type="tel" placeholder="Phone"><br>
                    <input type="checkbox" id="Newsletter">
                    <label for="Newsletter">Would you like to subscribe to our newsletter?</label><br>
                    <textarea placeholder="Type your message here..."></textarea><br>
                    <input type="submit" value="Submit">
                </form>
            </div>
        </div>
    </section>
    <!--FOOTER-->
    <footer>
        <table>
            <tr>
                <td>
                    <p>The Pet Shop!&copy; 2026</p>
                </td>

                <td>
                    <p>503-234-3966</p>
                </td>
            </tr>
        </table>
